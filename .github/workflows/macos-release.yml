name: macOS Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    uses: ./.github/workflows/release-reusable.yml
    with:
      runner: macos-14
      target: aarch64-apple-darwin
      binary_name: dress
      archive_name: dress-rehearsal-aarch64-apple-darwin.tar.gz
      publish_release_notes: false
