name: Linux Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    uses: ./.github/workflows/release-reusable.yml
    with:
      runner: ubuntu-latest
      target: x86_64-unknown-linux-gnu
      binary_name: dress
      archive_name: dress-rehearsal-x86_64-unknown-linux-gnu.tar.gz
